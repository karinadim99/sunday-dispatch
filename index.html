<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#6e7260">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="The Long Light">
<meta name="description" content="The Long Light — All the Good News That Mattered This Week.">
<title>The Long Light</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,600;0,700;1,300;1,600&family=Playfair+Display:ital,wght@0,700;0,900;1,400&family=EB+Garamond:ital,wght@0,400;1,400&family=Source+Sans+3:wght@400;600&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body {
  height: 100%; width: 100%;
  background: #6e7260;
  font-family: 'EB Garamond', Georgia, serif;
  overflow: hidden;
  -webkit-font-smoothing: antialiased;
  touch-action: auto;
  user-select: none;
}
:root {
  --ink: #1a1612;
  --ink-soft: #3d3830;
  --ink-muted: #6b6358;
  --paper: #f9f5ec;
  --paper-warm: #f2ead8;
  --paper-dark: #e8dfc8;
  --rule: #c8b89a;
  --rule-thick: #8b7355;
  --accent: #8b1a1a;
  --accent-gold: #b8860b;
  --shelf: #1a1208;
}
#app {
  width: 100%; height: 100%;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  background:
    repeating-linear-gradient(
      0deg,
      rgba(0,0,0,0.04) 0px, rgba(0,0,0,0.04) 1px,
      transparent 1px, transparent 60px
    ),
    linear-gradient(180deg, #7a7d6a 0%, #5e6253 100%);
  position: relative;
}
#app-header {
  width: 100%;
  max-width: 700px;
  padding: 7px 16px 5px;
  display: flex;
  justify-content: space-between;
  align-items: baseline;
  flex-shrink: 0;
}
#next-edition {
  font-family: 'Source Sans 3', sans-serif;
  font-size: clamp(9px, 2vw, 11px);
  color: #d4c98a;
  letter-spacing: 0.06em;
  text-align: right;
}
#book-wrap {
  width: 100%;
  max-width: 700px;
  flex: 1;
  display: flex;
  align-items: center;
  justify-content: center;
  perspective: 2600px;
  perspective-origin: 50% 46%;
  padding: 0 12px;
  position: relative;
  touch-action: pan-x;
}
#book {
  width: 100%;
  max-width: 680px;
  height: min(88vh, 560px);
  position: relative;
  transform-style: preserve-3d;
}
#book::after {
  content: '';
  position: absolute;
  left: 50%;
  top: 0; bottom: 0;
  width: 16px;
  transform: translateX(-50%);
  background: linear-gradient(to right,
    rgba(0,0,0,0.35) 0%,
    rgba(0,0,0,0.08) 40%,
    rgba(0,0,0,0.08) 60%,
    rgba(0,0,0,0.35) 100%
  );
  z-index: 100;
  pointer-events: none;
}
.page {
  position: absolute;
  top: 0; bottom: 0;
  width: 50%;
  background: var(--paper);
  overflow: visible;
  will-change: transform;
  transform-style: preserve-3d;
}
.page.left-page {
  left: 0;
  transform-origin: right center;
  border-radius: 3px 0 0 3px;
  box-shadow: -2px 0 14px rgba(0,0,0,0.28), inset -5px 0 16px rgba(0,0,0,0.06);
}
.page.right-page {
  left: 50%;
  transform-origin: left center;
  border-radius: 0 3px 3px 0;
  box-shadow: 2px 0 14px rgba(0,0,0,0.28), inset 5px 0 16px rgba(0,0,0,0.06);
}
.page-inner {
  position: absolute;
  inset: 0;
  padding: 14px 13px 52px;
  overflow-y: auto;
  overflow-x: hidden;
  background: var(--paper);
  display: flex;
  flex-direction: column;
  backface-visibility: hidden;
  -webkit-backface-visibility: hidden;
  border-radius: inherit;
  -webkit-overflow-scrolling: touch;
  scroll-behavior: smooth;
  touch-action: pan-y;
}
.page-inner::-webkit-scrollbar { width: 3px; }
.page-inner::-webkit-scrollbar-track { background: transparent; }
.page-inner::-webkit-scrollbar-thumb { background: var(--rule); border-radius: 2px; }
.page-inner::-webkit-scrollbar-thumb:hover { background: var(--rule-thick); }
.page-inner svg { max-width: 100%; flex-shrink: 0; display: block; }
.page-inner .body-text { flex-shrink: 0; }
.page-back-face {
  position: absolute;
  inset: 0;
  background: var(--paper-warm);
  backface-visibility: hidden;
  -webkit-backface-visibility: hidden;
  transform: rotateY(180deg);
  pointer-events: none;
  border-radius: inherit;
  background-image: repeating-linear-gradient(
    transparent, transparent 27px,
    rgba(160,140,100,0.10) 27px, rgba(160,140,100,0.10) 28px
  );
}
.flip-shadow {
  position: absolute;
  inset: 0;
  pointer-events: none;
  z-index: 15;
  border-radius: inherit;
  background: transparent;
}
.flip-corner {
  position: absolute;
  bottom: 0; right: 0;
  width: 48px; height: 48px;
  z-index: 500;
  cursor: pointer;
}
.flip-corner::before {
  content: '';
  position: absolute;
  bottom: 0; right: 0;
  width: 0; height: 0;
  border-style: solid;
  border-width: 0 0 38px 38px;
  border-color: transparent transparent var(--rule-thick) transparent;
  transition: border-width 0.2s ease;
}
.flip-corner::after {
  content: '›';
  position: absolute;
  bottom: 8px; right: 6px;
  font-size: 14px;
  color: var(--paper);
  font-family: 'Source Sans 3', sans-serif;
  font-weight: 600;
}
.flip-corner:hover::before {
  border-width: 0 0 48px 48px;
  border-color: transparent transparent var(--accent) transparent;
}
.flip-corner-back {
  position: absolute;
  bottom: 0; left: 0;
  width: 48px; height: 48px;
  z-index: 500;
  cursor: pointer;
}
.flip-corner-back::before {
  content: '';
  position: absolute;
  bottom: 0; left: 0;
  width: 0; height: 0;
  border-style: solid;
  border-width: 38px 38px 0 0;
  border-color: var(--rule-thick) transparent transparent transparent;
  transition: border-width 0.2s ease;
}
.flip-corner-back::after {
  content: '‹';
  position: absolute;
  bottom: 8px; left: 6px;
  font-size: 14px;
  color: var(--paper);
  font-family: 'Source Sans 3', sans-serif;
  font-weight: 600;
}
.flip-corner-back:hover::before {
  border-width: 48px 48px 0 0;
  border-color: var(--accent) transparent transparent transparent;
}
.mh-mini {
  border-top: 3px solid var(--ink);
  border-bottom: 1px solid var(--rule);
  padding: 3px 0 4px;
  margin-bottom: 7px;
  display: flex;
  justify-content: space-between;
  align-items: baseline;
  flex-shrink: 0;
}
.mh-mini-title {
  font-family: 'Playfair Display', serif;
  font-size: clamp(11px, 2.5vw, 15px);
  font-weight: 900;
  text-transform: uppercase;
  letter-spacing: -0.01em;
  color: var(--ink);
}
.mh-mini-meta {
  font-family: 'Source Sans 3', sans-serif;
  font-size: clamp(7px, 1.5vw, 9px);
  color: var(--ink-muted);
  letter-spacing: 0.04em;
}
.section-bar {
  border-top: 3px solid var(--ink);
  border-bottom: 1px solid var(--rule);
  padding: 3px 0 3px;
  margin-bottom: 4px;
  display: flex;
  justify-content: space-between;
  align-items: baseline;
  flex-shrink: 0;
}
.section-bar-left {
  font-family: 'Source Sans 3', sans-serif;
  font-size: clamp(7px, 1.5vw, 9px);
  font-weight: 600;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--ink-muted);
}
.section-bar-right {
  font-family: 'Source Sans 3', sans-serif;
  font-size: clamp(6.5px, 1.3vw, 8px);
  color: var(--ink-muted);
  letter-spacing: 0.04em;
}
.section-label {
  font-family: 'Source Sans 3', sans-serif;
  font-size: clamp(6px, 1.3vw, 7.5px);
  font-weight: 600;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  color: var(--ink-muted);
  border-bottom: 1px solid var(--rule-thick);
  padding-bottom: 2px;
  margin-bottom: 3px;
  flex-shrink: 0;
}
.source-line {
  font-family: 'Source Sans 3', sans-serif;
  font-size: clamp(6px, 1.2vw, 7.5px);
  color: var(--ink-muted);
  letter-spacing: 0.04em;
  margin-top: 2px;
  margin-bottom: 4px;
  padding-top: 2px;
  border-top: 0.5px solid var(--rule);
  flex-shrink: 0;
}
.source-line a {
  color: var(--accent);
  text-decoration: none;
  font-size: inherit;
  letter-spacing: .02em;
}
.source-line a:hover { text-decoration: underline; }
.article-kicker {
  font-family: 'Source Sans 3', sans-serif;
  font-size: clamp(6px, 1.3vw, 7.5px);
  font-weight: 600;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  color: var(--accent);
  margin-bottom: 1px;
}
.article-hl {
  font-family: 'Playfair Display', serif;
  font-weight: 700;
  line-height: 1.14;
  color: var(--ink);
  margin-bottom: 2px;
}
.hl-xl { font-size: clamp(15px, 3.2vw, 20px); }
.hl-lg { font-size: clamp(13px, 2.5vw, 16px); }
.hl-md { font-size: clamp(11.5px, 2.1vw, 14px); }
.hl-sm { font-size: clamp(10.5px, 1.9vw, 12.5px); }
.hl-xs { font-size: clamp(9.5px, 1.7vw, 11px); }
.dateline {
  font-family: 'Source Sans 3', sans-serif;
  font-size: clamp(6px, 1.2vw, 7.5px);
  font-weight: 600;
  letter-spacing: 0.05em;
  color: var(--paper);
  background: var(--ink-soft);
  display: inline-block;
  padding: 1px 5px;
  margin-bottom: 3px;
}
.body-text {
  font-family: 'EB Garamond', serif;
  font-size: clamp(9.5px, 1.85vw, 12px);
  line-height: 1.52;
  color: var(--ink-soft);
}
.body-text p { margin-bottom: 0.4em; }
.rule-h { height: 1px; background: var(--rule); margin: 5px 0; }
.rule-thick-h { height: 2px; background: var(--ink); margin: 5px 0; }
.pullquote {
  border-top: 2px solid var(--accent);
  border-bottom: 1px solid var(--rule-thick);
  padding: 5px 0 4px;
  margin: 5px 0;
}
.pullquote-text {
  font-family: 'Playfair Display', serif;
  font-style: italic;
  font-size: clamp(9.5px, 1.8vw, 12px);
  line-height: 1.3;
  color: var(--ink);
}
.pullquote-src {
  font-family: 'Source Sans 3', sans-serif;
  font-size: clamp(6.5px, 1.2vw, 8px);
  color: var(--ink-muted);
  margin-top: 2px;
  letter-spacing: 0.04em;
}
.infobox {
  background: var(--paper-dark);
  border: 1px solid var(--rule-thick);
  padding: 5px 8px;
  margin: 5px 0;
}
.infobox-title {
  font-family: 'Source Sans 3', sans-serif;
  font-size: clamp(6px, 1.2vw, 7.5px);
  font-weight: 600;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--accent);
  margin-bottom: 4px;
}
.infobox ul {
  list-style: none;
  font-family: 'EB Garamond', serif;
  font-size: clamp(9px, 1.7vw, 11px);
  line-height: 1.38;
  color: var(--ink-soft);
}
.infobox ul li {
  padding: 3px 0 3px 10px;
  position: relative;
  border-bottom: 0.5px solid var(--rule);
}
.infobox ul li:last-child { border-bottom: none; }
.infobox ul li::before {
  content: '';
  position: absolute;
  left: 0; top: 8px;
  width: 4px; height: 4px;
  background: var(--accent-gold);
  border-radius: 50%;
}
.cols-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
.col-rule { border-left: 1px solid var(--rule); padding-left: 10px; }
.orn { text-align: center; color: var(--rule-thick); font-size: 11px; letter-spacing: 4px; margin: 5px 0; }
#nav-bar {
  width: 100%;
  max-width: 700px;
  display: flex;
  justify-content: center;
  align-items: center;
  gap: 6px;
  padding: 6px 12px 10px;
  flex-shrink: 0;
}
.nav-dot {
  width: 7px; height: 7px;
  border-radius: 50%;
  background: rgba(242,234,216,0.22);
  cursor: pointer;
  transition: all 0.2s;
  border: none;
}
.nav-dot.active { background: var(--accent-gold); transform: scale(1.3); }
.nav-dot:hover { background: rgba(242,234,216,0.55); }
#page-indicator {
  font-family: 'Source Sans 3', sans-serif;
  font-size: 9px;
  color: rgba(242,234,216,0.55);
  letter-spacing: 0.1em;
  text-transform: uppercase;
  text-align: center;
  padding-bottom: 2px;
  flex-shrink: 0;
}
.t10 {
  display: flex;
  gap: 6px;
  align-items: flex-start;
  padding: 3px 0;
  border-bottom: 0.5px solid var(--rule);
  flex-shrink: 0;
}
.t10:last-child { border-bottom: none; }
.t10-n {
  font-family: 'Playfair Display', serif;
  font-size: clamp(16px, 3vw, 20px);
  font-weight: 900;
  color: var(--paper-dark);
  -webkit-text-stroke: 1px var(--rule-thick);
  line-height: 1;
  min-width: 20px;
}
.t10-h {
  font-family: 'Playfair Display', serif;
  font-size: clamp(8.5px, 1.6vw, 10.5px);
  font-weight: 700;
  line-height: 1.18;
  color: var(--ink);
  margin-bottom: 1px;
}
.t10-s {
  font-family: 'Source Sans 3', sans-serif;
  font-size: clamp(6.5px, 1.2vw, 8px);
  color: var(--ink-muted);
  line-height: 1.25;
}
#swipe-hint {
  position: absolute;
  bottom: 60px;
  left: 50%;
  transform: translateX(-50%);
  font-family: 'Source Sans 3', sans-serif;
  font-size: 10px;
  color: rgba(242,234,216,0.45);
  letter-spacing: 0.1em;
  text-transform: uppercase;
  pointer-events: none;
  animation: fadeHint 3s ease 2s forwards;
  white-space: nowrap;
}
@keyframes fadeHint {
  0% { opacity: 1; }
  100% { opacity: 0; }
}
#loading {
  position: fixed;
  inset: 0;
  background: #5e6253;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  z-index: 9999;
  transition: opacity 0.6s;
}
#loading-title {
  font-family: 'Playfair Display', serif;
  font-size: clamp(20px, 6vw, 34px);
  font-weight: 900;
  color: #f2ead8;
  text-transform: uppercase;
  text-align: center;
  line-height: 1.1;
  letter-spacing: -0.02em;
}
#loading-sub {
  font-family: 'EB Garamond', serif;
  font-style: italic;
  font-size: clamp(11px, 2.5vw, 15px);
  color: #d4c98a;
  margin-top: 8px;
  text-align: center;
}
#loading-bar {
  margin-top: 24px;
  width: 160px;
  height: 1px;
  background: rgba(255,255,255,0.15);
  position: relative;
  overflow: hidden;
}
#loading-fill {
  position: absolute;
  top: 0; left: -100%;
  height: 100%;
  width: 100%;
  background: #d4c98a;
  animation: loadBar 1.4s ease 0.3s forwards;
}
@keyframes loadBar {
  to { left: 0; }
}
/* News image */
.news-img {
  width: 100%;
  aspect-ratio: 16/7;
  object-fit: cover;
  display: block;
  margin-bottom: 4px;
  filter: sepia(18%) contrast(1.04);
  flex-shrink: 0;
}
.img-caption {
  font-family: 'Source Sans 3', sans-serif;
  font-size: clamp(5.5px, 1.1vw, 7px);
  color: var(--ink-muted);
  letter-spacing: 0.03em;
  margin-bottom: 4px;
  line-height: 1.3;
  flex-shrink: 0;
}
</style>
</head>
<body>

<div id="loading">
  <div id="loading-title">The Long<br>Light</div>
  <div id="loading-sub">All the Good News That Mattered This Week</div>
  <div id="loading-bar"><div id="loading-fill"></div></div>
</div>

<div id="app">
  <div id="app-header">
    <div id="edition-vol" style="font-family:'Source Sans 3',sans-serif;font-size:clamp(9px,2vw,11px);color:rgba(242,234,216,0.6);letter-spacing:.08em;">Vol. I &middot; No. 2 &middot; 29 March 2026</div>

  <div id="page-indicator">Spread <span id="cur-pg">1</span> of <span id="tot-pg">7</span></div>
  <div id="nav-bar"></div>
</div>

// ─────────────────────────────────────────
// BOOK ENGINE
// ─────────────────────────────────────────
let currentSpread = 0;
const totalSpreads = spreads.length;
let isAnimating = false;
let touchStartX = 0;

function buildBook() {
  const book = document.getElementById('book');
  spreads.forEach((spread, i) => {
    const leftPage = document.createElement('div');
    leftPage.className = 'page left-page';
    leftPage.id = 'spread-' + i + '-left';
    leftPage.innerHTML = `
      <div class="page-inner">${spread.left}</div>
      <div class="page-back-face"></div>
      <div class="flip-shadow" id="shadow-left-${i}"></div>
      ${i > 0 ? '<div class="flip-corner-back" onclick="flipBack()"></div>' : ''}`;

    const rightPage = document.createElement('div');
    rightPage.className = 'page right-page';
    rightPage.id = 'spread-' + i + '-right';
    rightPage.innerHTML = `
      <div class="page-inner">${spread.right}</div>
      <div class="page-back-face"></div>
      <div class="flip-shadow" id="shadow-right-${i}"></div>
      ${i < spreads.length - 1 ? '<div class="flip-corner" onclick="flipForward()"></div>' : ''}`;

    book.appendChild(leftPage);
    book.appendChild(rightPage);
  });

  buildNav();
  updateSpreadDisplay();
}

function buildNav() {
  const nav = document.getElementById('nav-bar');
  nav.innerHTML = '';
  spreads.forEach((_, i) => {
    const dot = document.createElement('button');
    dot.className = 'nav-dot' + (i === 0 ? ' active' : '');
    dot.setAttribute('aria-label', 'Go to spread ' + (i + 1));
    dot.onclick = () => goToSpread(i);
    nav.appendChild(dot);
  });
}

function updateSpreadDisplay() {
  spreads.forEach((_, i) => {
    const lp = document.getElementById('spread-' + i + '-left');
    const rp = document.getElementById('spread-' + i + '-right');
    if (!lp || !rp) return;

    if (i < currentSpread) {
      lp.style.transform = 'rotateY(-180deg)';
      lp.style.zIndex = i + 1;
      rp.style.transform = 'rotateY(0deg)';
      rp.style.zIndex = i + 1;
    } else if (i === currentSpread) {
      lp.style.transform = 'rotateY(0deg)';
      lp.style.zIndex = totalSpreads + 10;
      rp.style.transform = 'rotateY(0deg)';
      rp.style.zIndex = totalSpreads + 10;
      lp.style.transition = '';
      rp.style.transition = '';
    } else {
      lp.style.transform = 'rotateY(0deg)';
      lp.style.zIndex = totalSpreads - i;
      rp.style.transform = 'rotateY(0deg)';
      rp.style.zIndex = totalSpreads - i;
    }
  });

  document.querySelectorAll('.nav-dot').forEach((dot, i) => {
    dot.classList.toggle('active', i === currentSpread);
  });
  document.getElementById('cur-pg').textContent = currentSpread + 1;
  document.getElementById('tot-pg').textContent = totalSpreads;
}

function flipForward() {
  if (isAnimating || currentSpread >= totalSpreads - 1) return;
  isAnimating = true;

  const rp = document.getElementById('spread-' + currentSpread + '-right');
  const lp = document.getElementById('spread-' + currentSpread + '-left');
  rp.style.transition = 'transform 0.55s cubic-bezier(.645,.045,.355,1)';
  lp.style.transition = 'transform 0.55s cubic-bezier(.645,.045,.355,1)';
  rp.style.transform = 'rotateY(180deg)';
  lp.style.transform = 'rotateY(-180deg)';

  setTimeout(() => {
    currentSpread++;
    updateSpreadDisplay();
    isAnimating = false;
  }, 560);
}

function flipBack() {
  if (isAnimating || currentSpread <= 0) return;
  isAnimating = true;
  currentSpread--;

  const rp = document.getElementById('spread-' + currentSpread + '-right');
  const lp = document.getElementById('spread-' + currentSpread + '-left');
  rp.style.transition = 'transform 0.55s cubic-bezier(.645,.045,.355,1)';
  lp.style.transition = 'transform 0.55s cubic-bezier(.645,.045,.355,1)';
  rp.style.transform = 'rotateY(0deg)';
  lp.style.transform = 'rotateY(0deg)';
  rp.style.zIndex = totalSpreads + 10;
  lp.style.zIndex = totalSpreads + 10;

  setTimeout(() => {
    updateSpreadDisplay();
    isAnimating = false;
  }, 560);
}

function goToSpread(index) {
  if (isAnimating || index === currentSpread) return;
  currentSpread = index;
  updateSpreadDisplay();
}

// Touch/swipe support
const bookWrap = document.getElementById('book-wrap');
bookWrap.addEventListener('touchstart', e => { touchStartX = e.touches[0].clientX; }, { passive: true });
bookWrap.addEventListener('touchend', e => {
  const dx = e.changedTouches[0].clientX - touchStartX;
  if (Math.abs(dx) > 40) { dx < 0 ? flipForward() : flipBack(); }
}, { passive: true });

// Keyboard support
document.addEventListener('keydown', e => {
  if (e.key === 'ArrowRight' || e.key === 'ArrowDown') flipForward();
  if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') flipBack();
});

// Init
window.addEventListener('load', () => {
  buildBook();
  setTimeout(() => {
    const loading = document.getElementById('loading');
    loading.style.opacity = '0';
    setTimeout(() => loading.style.display = 'none', 650);
  }, 1600);
});
</script>
