  <div class="article-kicker">Lead Story &middot; Space</div>
  <div class="article-hl hl-xl">Artemis II Crew Prepare for Reentry After Historic Lunar Journey</div>
  <div class="dateline">Kennedy Space Center, Florida, USA &middot; 10 April 2026</div>
  <div class="body-text">
    <p>As this edition goes to press, four NASA astronauts are preparing for reentry into Earth&rsquo;s atmosphere at roughly 25,000 mph &mdash; the final act of a 10-day voyage that took them around the Moon and back. Artemis II is humanity&rsquo;s first crewed journey to the vicinity of the Moon since Apollo 17 in December 1972. For the first time in more than half a century, human beings have been to the Moon and are coming home.</p>
    <p>Live Science reports that the mission completed all primary objectives without critical failures. The crew proved that humans can live and work in the deep-space radiation environment of cislunar space &mdash; validating the systems needed for Artemis III, which will land the first woman and next man on the lunar surface.</p>

  <div class="article-hl hl-lg">A Global Milestone: More Than 10% of the Ocean Is Now Officially Protected</div>

    <p>The United Nations Environment Programme announced this week that more than 10% of the ocean is now officially under conservation protection. In just the last two years, 5 million square kilometres &mdash; an area larger than the entire European Union &mdash; was newly designated as protected marine territory. The percentage of ocean under formal conservation now stands at 10.01%, up from 8.6% in 2024.</p>
    <p>&ldquo;We all depend on the ocean for our survival; over half of the world&rsquo;s oxygen is produced by life in the ocean,&rdquo; said Neville Ash, director of UNEP&rsquo;s World Conservation Monitoring Centre. &ldquo;This is a moment for celebration &mdash; and a reminder of how much work remains.&rdquo;</p>
    <p>The challenge ahead is considerable. Under the Kunming-Montr&eacute;al Biodiversity Framework, nations committed to protecting 30% of Earth&rsquo;s ocean by 2030. An area the size of the Indian Ocean must be protected in the next four years &mdash; and existing areas must be genuinely policed, not merely protected on paper. Both the ambition and the accountability matter equally.</p>

    <p>Colorectal cancer is among the most common and most preventable cancers in the world &mdash; yet the gold-standard screening test, the colonoscopy, requires sedation, full bowel preparation, and a hospital visit. Many people avoid it entirely. That avoidance costs lives.</p>
    <p>A new AI-powered stool test published this week changes the picture dramatically. Scientists used artificial intelligence to map the gut microbiome at unprecedented resolution, identifying subtle microbial patterns reliably linked to colorectal cancer. The test detects 90% of cancers &mdash; a sensitivity comparable to colonoscopy &mdash; without any invasive procedure. A patient provides a stool sample; the AI reads the microbial fingerprint.</p>
    <p>The implications extend beyond convenience. In low- and middle-income countries where colonoscopy infrastructure is limited, a simple, laboratory-based test could bring cancer screening to populations currently without access. Colorectal cancer is highly treatable when caught early and often fatal when caught late. A non-invasive screen of this accuracy could save hundreds of thousands of lives every year.</p>

  <div class="article-kicker">Neuroscience &middot; Bone Health</div>

    <p>Osteoporosis affects 200 million people worldwide. Scientists identified a receptor called GPR133 that powerfully regulates bone density &mdash; and found a compound, AP503, that activates it to significantly boost bone formation in animal models. Unlike existing osteoporosis drugs that slow bone loss, this approach may reverse it.</p>
  </div>
  <div class="source-line">ScienceDaily, 6 Apr 2026 &middot; <a href="https://www.sciencedaily.com/news/health_medicine/" target="_blank">Read more &rarr;</a></div>
</div>`,

    <p>For years, the intermittency of solar and wind power gave fossil fuel advocates a ready argument: you cannot run a modern economy on weather. That argument has now been empirically retired across a growing list of countries.</p>

    <p>Scientists this week announced a new filtration technology using nano-sized molecular cages that lock onto PFAS molecules with high specificity, removing 98% of these chemicals &mdash; including the short-chain variants &mdash; from water. Unlike activated carbon filters that must be discarded, the nano-cage system can be regenerated and reused, significantly reducing long-term costs.</p>

    const l=document.getElementById('s'+i+'l'),r=document.getElementById('s'+i+'r');if(!l||!r)return;
    if(i<cur){l.style.transform='rotateY(-180deg)';l.style.zIndex=i+1;r.style.transform='rotateY(0deg)';r.style.zIndex=i+1;}
    else if(i===cur){l.style.transform='rotateY(0deg)';l.style.zIndex=total+10;r.style.transform='rotateY(0deg)';r.style.zIndex=total+10;l.style.transition='';r.style.transition='';}
    else{l.style.transform='rotateY(0deg)';l.style.zIndex=total-i;r.style.transform='rotateY(0deg)';r.style.zIndex=total-i;}
  });
  document.querySelectorAll('.nav-dot').forEach((d,i)=>d.classList.toggle('active',i===cur));
  document.getElementById('cur-pg').textContent=cur+1;document.getElementById('tot-pg').textContent=total;
}
function next(){
  if(anim||cur>=total-1)return;anim=true;
  const l=document.getElementById('s'+cur+'l'),r=document.getElementById('s'+cur+'r');
  l.style.transition='transform .55s cubic-bezier(.645,.045,.355,1)';r.style.transition='transform .55s cubic-bezier(.645,.045,.355,1)';
  l.style.transform='rotateY(-180deg)';r.style.transform='rotateY(180deg)';
  setTimeout(()=>{cur++;upd();anim=false;},560);
}
function prev(){
  if(anim||cur<=0)return;anim=true;cur--;
  const l=document.getElementById('s'+cur+'l'),r=document.getElementById('s'+cur+'r');
  l.style.transition='transform .55s cubic-bezier(.645,.045,.355,1)';r.style.transition='transform .55s cubic-bezier(.645,.045,.355,1)';
  l.style.transform='rotateY(0deg)';l.style.zIndex=total+10;r.style.transform='rotateY(0deg)';r.style.zIndex=total+10;
  setTimeout(()=>{upd();anim=false;},560);
}
function go(i){if(anim||i===cur)return;cur=i;upd();}
const bw=document.getElementById('book-wrap');
bw.addEventListener('touchstart',e=>{tx=e.touches[0].clientX;},{passive:true});
bw.addEventListener('touchend',e=>{const dx=e.changedTouches[0].clientX-tx;if(Math.abs(dx)>40)dx<0?next():prev();},{passive:true});
document.addEventListener('keydown',e=>{if(e.key==='ArrowRight'||e.key==='ArrowDown')next();if(e.key==='ArrowLeft'||e.key==='ArrowUp')prev();});
window.addEventListener('load',()=>{
  build();
  setTimeout(()=>{const l=document.getElementById('loading');l.style.opacity='0';setTimeout(()=>l.style.display='none',650);},1600);
});
</script>
</body>
</html>
